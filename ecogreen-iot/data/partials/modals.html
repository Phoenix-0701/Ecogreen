<!-- ══════════════════════════════════════════════════════
  partials/modals.html — Global Modals & Toast
  Use case: Confirm dialog, Add Device modal, Toast notification
══════════════════════════════════════════════════════ -->

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- CONFIRM MODAL -->
<div id="confirmModal">
  <div class="bg-white rounded-3xl p-8 shadow-2xl max-w-sm w-full mx-4 space-y-4">
    <h3 id="confirmTitle" class="font-serif text-xl font-bold">Xác nhận</h3>
    <p id="confirmMsg" class="text-on-surface-variant text-sm"></p>
    <div class="flex gap-3 pt-2">
      <button onclick="closeConfirm()"
        class="flex-1 py-3 rounded-xl border border-outline-variant/30 font-bold text-on-surface-variant hover:bg-surface-container transition-all">
        Hủy
      </button>
      <button id="confirmOk"
        class="flex-1 py-3 rounded-xl bg-primary text-on-primary font-bold hover:scale-[1.02] transition-all">
        Xác nhận
      </button>
    </div>
  </div>
</div>

<!-- ADD DEVICE MODAL -->
<div id="addDeviceModal">
  <div class="bg-white rounded-3xl p-8 shadow-2xl max-w-md w-full mx-4 space-y-5">
    <div class="flex justify-between items-center">
      <h3 class="font-serif text-xl font-bold">Đăng ký thiết bị mới</h3>
      <button onclick="closeAddDevice()" class="text-on-surface-variant hover:text-primary p-1">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div>
      <label class="text-sm font-bold text-on-surface-variant block mb-2">Loại thiết bị</label>
      <select id="deviceType" class="w-full bg-surface-container-low border-none rounded-xl py-3 px-4 outline-none"
        onchange="onDeviceTypeChange()">
        <option value="">-- Chọn loại --</option>
        <option value="sensor_temp">🌡 Cảm biến nhiệt độ</option>
        <option value="sensor_soil">🪴 Cảm biến đất</option>
        <option value="sensor_light">☀️ Cảm biến ánh sáng</option>
        <option value="actuator_pump">💦 Máy bơm</option>
        <option value="actuator_fan">🌀 Quạt</option>
        <option value="actuator_led">🔆 LED NeoPixel</option>
        <option value="display_lcd">🖥 LCD</option>
      </select>
    </div>
    <div id="deviceFormFields"></div>
    <div class="flex gap-3 pt-2">
      <button onclick="closeAddDevice()"
        class="flex-1 py-3 rounded-xl border border-outline-variant/30 font-bold text-on-surface-variant">Hủy</button>
      <button onclick="registerDevice()"
        class="flex-1 py-3 rounded-xl bg-primary text-on-primary font-bold">Đăng ký</button>
    </div>
  </div>
</div>
