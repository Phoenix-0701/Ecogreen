<!-- pages/devices.html — Quản lý thiết bị
  Use case: Đăng ký và quản lý các thiết bị IoT (Factory Method Pattern) -->
<!-- ═══════ DEVICES ═══════ -->
          <div
            id="page-devices"
            class="page p-6 md:p-8 space-y-8 max-w-7xl mx-auto"
          >
            <div
              class="relative overflow-hidden rounded-3xl p-10 bg-primary-container/10 flex flex-col md:flex-row items-center justify-between gap-8"
            >
              <div
                class="absolute top-0 right-0 w-64 h-64 bg-primary/5 rounded-full -mr-20 -mt-20 blur-3xl"
              ></div>
              <div class="z-10 space-y-4 max-w-2xl">
                <h3
                  class="font-serif text-4xl md:text-5xl text-on-primary-container leading-tight"
                >
                  Quản lý &amp; Đăng ký thiết bị
                </h3>
                <p class="text-on-surface-variant/80 font-medium">
                  Factory Method Pattern — Thêm thiết bị mới mà không sửa
                  firmware cốt lõi.
                </p>
              </div>
              <button
                onclick="openAddDevice()"
                class="bg-gradient-to-r from-primary to-primary-container text-white px-8 py-4 rounded-full font-bold shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center gap-2 z-10"
              >
                <span class="material-symbols-outlined">add</span>Đăng ký thiết
                bị mới
              </button>
            </div>
            <div>
              <div class="flex justify-between items-center mb-4">
                <h4 class="font-serif text-2xl text-on-surface">
                  Thiết bị hiện có
                </h4>
                <span
                  id="device-count-label"
                  class="text-sm text-on-surface-variant/60 font-medium"
                  >0 thiết bị</span
                >
              </div>
              <div
                id="deviceGrid"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"
              ></div>
            </div>
          </div>
