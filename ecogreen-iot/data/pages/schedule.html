<!-- pages/schedule.html — Lịch tưới
  Use case: Lập lịch tưới theo giờ và ngày trong tuần -->
<!-- ═══════ SCHEDULE ═══════ -->
          <div id="page-schedule" class="page p-6 md:p-8 max-w-7xl mx-auto">
            <div
              class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8"
            >
              <div>
                <h3 class="font-serif text-4xl font-bold text-on-surface">
                  Kiểm soát lịch tưới
                </h3>
                <p class="text-on-surface-variant font-medium mt-1">
                  Quản lý chu kỳ tưới tự động theo giờ.
                </p>
              </div>
              <div
                class="flex items-center gap-4 p-4 bg-white rounded-2xl shadow-sm border border-slate-100"
              >
                <div>
                  <span
                    class="text-xs font-bold text-on-surface-variant uppercase tracking-wider block"
                    >Lịch tưới tự động</span
                  >
                  <span class="text-sm font-semibold text-primary"
                    >Hệ thống đang hoạt động</span
                  >
                </div>
                <label class="toggle-switch">
                  <input
                    type="checkbox"
                    id="schedEnable"
                    onchange="toggleSchedule()"
                  />
                  <div class="toggle-track"></div>
                  <div class="toggle-thumb"></div>
                </label>
              </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
              <div class="lg:col-span-8 space-y-4">
                <div class="flex justify-between items-center">
                  <h4 class="font-serif text-xl text-on-surface">
                    Chu kỳ đã lập lịch
                  </h4>
                  <button
                    onclick="addSchedule()"
                    class="bg-gradient-to-br from-primary to-primary-container text-on-primary px-6 py-3 rounded-xl font-bold text-sm flex items-center gap-2 hover:scale-[1.02] hover:shadow-lg transition-all shadow-primary/20"
                  >
                    <span class="material-symbols-outlined text-sm">add</span
                    >Thêm lịch mới
                  </button>
                </div>
                <div id="scheduleList" class="space-y-3"></div>
                <button
                  onclick="saveSchedule()"
                  class="w-full bg-primary text-on-primary font-bold py-3.5 rounded-xl shadow-lg hover:scale-[1.01] transition-all"
                >
                  Lưu tất cả lịch
                </button>
              </div>

              <div class="lg:col-span-4 space-y-6">
                <div
                  class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-4"
                >
                  <h4 class="font-serif text-lg text-on-surface">
                    Dự báo tiêu thụ
                  </h4>
                  <div class="h-32 flex items-end gap-1.5">
                    <div
                      class="flex-1 bg-surface-container-high rounded-t h-1/4"
                    ></div>
                    <div
                      class="flex-1 bg-surface-container-high rounded-t h-1/3"
                    ></div>
                    <div class="flex-1 bg-primary/60 rounded-t h-3/4"></div>
                    <div
                      class="flex-1 bg-surface-container-high rounded-t h-1/2"
                    ></div>
                    <div
                      class="flex-1 bg-surface-container-high rounded-t h-2/3"
                    ></div>
                    <div
                      class="flex-1 bg-surface-container-high rounded-t h-1/4"
                    ></div>
                    <div class="flex-1 bg-secondary/60 rounded-t h-full"></div>
                    <div
                      class="flex-1 bg-surface-container-high rounded-t h-1/3"
                    ></div>
                  </div>
                  <div class="grid grid-cols-2 gap-3">
                    <div class="p-3 bg-primary/5 rounded-2xl text-center">
                      <span
                        class="text-[10px] font-bold text-primary uppercase block mb-1"
                        >Tổng</span
                      >
                      <span class="font-serif text-xl">--L</span>
                    </div>
                    <div class="p-3 bg-tertiary/5 rounded-2xl text-center">
                      <span
                        class="text-[10px] font-bold text-tertiary uppercase block mb-1"
                        >Tiết kiệm</span
                      >
                      <span class="font-serif text-xl">--%</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
