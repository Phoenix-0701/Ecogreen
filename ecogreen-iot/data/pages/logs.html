<!-- pages/logs.html — Nhật ký hoạt động -->
<!-- ═══════ LOGS ═══════ -->
<div id="page-logs" class="page p-8 space-y-6 max-w-7xl mx-auto">
  <!-- ── Header ── -->
  <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
    <div class="space-y-2">
      <h3 class="font-serif text-4xl text-on-surface leading-tight">
        Bản ghi hệ thống
      </h3>
      <p class="text-on-surface-variant max-w-lg text-sm">
        Giám sát liên tục các thay đổi môi trường và các kích hoạt tự động trong
        Nhà kính Bảo tồn.
      </p>
    </div>
    <div class="flex items-center gap-3">
      <button
        onclick="clearLogs()"
        class="px-5 py-2.5 rounded-full border border-outline-variant/40 text-on-surface font-bold text-sm hover:bg-surface-container transition-all active:scale-95"
      >
        Xóa nhật ký
      </button>
      <button
        onclick="exportLogs()"
        class="px-5 py-2.5 rounded-full bg-primary text-white font-bold text-sm shadow-md hover:scale-[1.02] active:scale-95 transition-all flex items-center gap-2"
      >
        <span class="material-symbols-outlined text-sm">download</span>Xuất dữ
        liệu
      </button>
    </div>
  </div>

  <!-- ── Search + Filter — nền trắng, border, rounded-full ── -->
  <div class="flex flex-wrap items-center gap-3">
    <div class="flex-1 min-w-[280px] relative">
      <span
        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 text-xl"
        >search</span
      >
      <input
        type="text"
        class="w-full pl-12 pr-4 py-3.5 rounded-full bg-white border border-outline-variant/30 focus:ring-2 focus:ring-primary/20 text-sm placeholder:text-on-surface-variant/40 outline-none shadow-sm"
        placeholder="Tìm kiếm theo hoạt động, kích hoạt hoặc thời gian..."
        oninput="filterLogs(this.value)"
      />
    </div>
    <button
      class="px-5 py-3.5 bg-white rounded-full border border-outline-variant/30 flex items-center gap-2 text-sm font-medium text-on-surface hover:border-primary/40 transition-colors shadow-sm"
    >
      <span class="material-symbols-outlined text-base">filter_list</span>Bộ lọc
    </button>
    <button
      class="px-5 py-3.5 bg-white rounded-full border border-outline-variant/30 flex items-center gap-2 text-sm font-medium text-on-surface hover:border-primary/40 transition-colors shadow-sm"
    >
      <span class="material-symbols-outlined text-base">calendar_today</span
      >Khoảng thời gian
    </button>
  </div>

  <!-- ── Table ── -->
  <div class="bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead>
          <tr class="border-b border-outline-variant/20">
            <th
              class="px-6 py-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant/60"
            >
              Mã
            </th>
            <th
              class="px-6 py-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant/60"
            >
              Bắt đầu
            </th>
            <th
              class="px-6 py-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant/60"
            >
              Kết thúc
            </th>
            <th
              class="px-6 py-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant/60"
            >
              Thời lượng
            </th>
            <th
              class="px-6 py-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant/60"
            >
              Lý do
            </th>
            <th
              class="px-6 py-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant/60"
            >
              Trạng thái
            </th>
            <th
              class="px-6 py-4 text-xs font-bold uppercase tracking-widest text-on-surface-variant/60 text-right"
            >
              Chi tiết
            </th>
          </tr>
        </thead>
        <tbody
          id="logTbody"
          class="divide-y-2 divide-surface-variant/30"
        ></tbody>
      </table>
    </div>
    <!-- Footer -->
    <div
      class="px-6 py-4 bg-surface-container-low/40 flex items-center justify-between"
    >
      <span id="log-count-label" class="text-xs text-on-surface-variant/60"
        >0 bản ghi</span
      >
      <div id="logPagination" class="flex gap-1"></div>
    </div>
  </div>

  <!-- ── Stats Cards — Stitch style: surface-container-low, số lớn serif ── -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-5 pb-8">
    <div class="bg-surface-container-low rounded-2xl p-6 flex flex-col gap-3">
      <span
        class="text-[10px] uppercase font-bold tracking-widest text-on-surface-variant"
        >Tỷ lệ thành công</span
      >
      <div class="flex items-end gap-3">
        <span id="log-success-rate" class="font-serif text-4xl text-primary"
          >--</span
        >
      </div>
    </div>
    <div class="bg-surface-container-low rounded-2xl p-6 flex flex-col gap-3">
      <span
        class="text-[10px] uppercase font-bold tracking-widest text-on-surface-variant"
        >Tổng thời gian bơm</span
      >
      <div class="flex items-end gap-3">
        <span id="log-total-time" class="font-serif text-4xl text-on-surface"
          >--</span
        >
      </div>
    </div>
    <div class="bg-surface-container-low rounded-2xl p-6 flex flex-col gap-3">
      <span
        class="text-[10px] uppercase font-bold tracking-widest text-on-surface-variant"
        >Tổng lần bơm</span
      >
      <div class="flex items-end gap-3">
        <span id="log-total-count" class="font-serif text-4xl text-on-surface"
          >0</span
        >
        <span class="text-xs text-on-surface-variant mb-1 font-medium"
          >lần kích hoạt</span
        >
      </div>
    </div>
  </div>
</div>
