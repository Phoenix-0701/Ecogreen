version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: ecogreen-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: ecogreendb
    ports:
      - '5433:5432'
    volumes:
      - ecogreen-postgresdata:/var/lib/postgresql/data

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: ecogreen-mqtt
    restart: always
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ecogreen-mqttdata:/mosquitto/data

volumes:
  ecogreen-postgresdata:
  ecogreen-mqttdata:
